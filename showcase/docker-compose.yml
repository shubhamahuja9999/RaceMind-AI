# RaceMind AI Research Lab — local full-stack (backend + frontend).
# Usage:
#   1. Copy the trained model:  cp ../data/checkpoints/ppo_1m/best.zip backend/best.zip
#   2. docker compose up --build
#   3. Open http://localhost:3000

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/best.zip
      VIDEO_DIR: /app/videos
      MAX_STEPS: "600"
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      # Mount the model so you don't have to rebuild to swap it.
      - ./backend/best.zip:/app/best.zip:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    restart: unless-stopped
