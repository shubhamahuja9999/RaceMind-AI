name: Showcase CI

# Build-checks the RaceMind AI Research Lab showcase (frontend + backend).
on:
  push:
    paths:
      - "showcase/**"
      - ".github/workflows/showcase.yml"
  pull_request:
    paths:
      - "showcase/**"
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showcase/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_TELEMETRY_DISABLED: "1"

  backend:
    name: Backend import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showcase/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (lightweight, no torch/box2d)
        run: pip install fastapi uvicorn pydantic numpy imageio
      - name: Byte-compile
        run: python -m compileall -q main.py inference.py
