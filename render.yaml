# Render Blueprint — NATIVE Python runtime (no Docker).
# Deploy via Render → New → Blueprint (select this repo).
#
# Why the previous native builds failed and how this fixes them:
#   * Render defaulted to Python 3.14, which has NO pygame wheel, so pip tried to
#     compile pygame from source and failed on missing SDL. -> PYTHON_VERSION 3.12
#     makes pip use pygame's prebuilt wheel (no SDL/compile needed).
#   * box2d has no wheel for 3.12, so it compiles from source and needs SWIG.
#     -> the build command installs `swig` FIRST.
#   * The default torch is a multi-GB CUDA build. -> install CPU-only torch first.
services:
  - type: web
    name: racemind-api
    runtime: python
    rootDir: showcase/backend
    buildCommand: bash build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free             # 512 MB — see the memory note in deployment.md
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SDL_VIDEODRIVER   # headless rendering (also set in code)
        value: dummy
      # Set to a public model URL (e.g. a GitHub release asset):
      #   https://github.com/shubhamahuja9999/RaceMind-AI/releases/download/v1.0.0/best.zip
      - key: MODEL_URL
        sync: false
      # Your deployed frontend origin, e.g. https://racemind-ai.vercel.app
      - key: CORS_ORIGINS
        sync: false
      - key: MODEL_PATH
        value: /tmp/best.zip
      - key: VIDEO_DIR
        value: /tmp/videos
      # Steps per demo episode. The free 0.1-CPU instance runs ~2-3 steps/sec, so
      # keep this modest: 300 -> ~2 min first render (then cached + warmed at
      # startup). Lower to 150-200 for snappier cold runs; raise on a paid instance.
      - key: MAX_STEPS
        value: "300"
